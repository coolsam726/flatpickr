name: run-tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest]
        php: [8.5, 8.4, 8.3, 8.2]
        laravel: [13.*, 12.*, 11.*]
        stability: [prefer-lowest, prefer-stable]
        include:
          - laravel: 13.*
            testbench: ^11.0
            carbon: ^3.8.6
            pest: ^4.4
            pest-plugin-laravel: ^4.1
            pest-plugin-livewire: ^4.0
            larastan: ^3.1
          - laravel: 12.*
            testbench: ^10.0
            carbon: ^3.8.6
            pest: ^3.8
            pest-plugin-laravel: ^3.1
            pest-plugin-livewire: ^3.0
            larastan: ^3.1
          - laravel: 11.*
            testbench: ^9.0
            carbon: ^3.8.4
            pest: ^3.8
            pest-plugin-laravel: ^3.1
            pest-plugin-livewire: ^3.0
            larastan: ^3.1
        exclude:
          - laravel: 13.*
            php: 8.2
          - laravel: 11.*
            php: 8.5

    name: P${{ matrix.php }} - L${{ matrix.laravel }} - ${{ matrix.stability }} - ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Configure Git line endings
        if: runner.os == 'Windows'
        shell: bash
        run: git config --global core.autocrlf false

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick, fileinfo, pcov
          coverage: pcov

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" --no-interaction --no-update
          composer require --dev "orchestra/testbench:${{ matrix.testbench }}" "nesbot/carbon:${{ matrix.carbon }}" "pestphp/pest:${{ matrix.pest }}" "pestphp/pest-plugin-laravel:${{ matrix.pest-plugin-laravel }}" "pestphp/pest-plugin-livewire:${{ matrix.pest-plugin-livewire }}" "nunomaduro/larastan:${{ matrix.larastan }}" --no-interaction --no-update
          composer update --${{ matrix.stability }} --prefer-dist --no-interaction

      - name: List Installed Dependencies
        run: composer show -D

      - name: Check code style
        run: vendor/bin/pint --test

      - name: Execute tests
        run: vendor/bin/pest --ci --coverage --min=0

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.php == '8.4' && matrix.laravel == '13.*' && matrix.stability == 'prefer-stable'
        uses: codecov/codecov-action@v5
        with:
          files: build/logs/clover.xml
          fail_ci_if_error: false

  platform-smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: 8.5
            laravel: 13.*
            filament: ^5.0
            testbench: ^11.0
            carbon: ^3.8.6
            pest: ^4.4
            pest-plugin-laravel: ^4.1
            pest-plugin-livewire: ^4.0
          - php: 8.4
            laravel: 13.*
            filament: ^5.0
            testbench: ^11.0
            carbon: ^3.8.6
            pest: ^4.4
            pest-plugin-laravel: ^4.1
            pest-plugin-livewire: ^4.0
          - php: 8.2
            laravel: 12.*
            filament: ^4.0
            testbench: ^10.0
            carbon: ^3.8.6
            pest: ^3.8
            pest-plugin-laravel: ^3.1
            pest-plugin-livewire: ^3.0

    name: Smoke P${{ matrix.php }} - L${{ matrix.laravel }} - F${{ matrix.filament }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick, fileinfo
          coverage: none

      - name: Install dependencies
        run: |
          composer require "laravel/framework:${{ matrix.laravel }}" "filament/forms:${{ matrix.filament }}" "filament/support:${{ matrix.filament }}" --no-interaction --no-update
          composer require --dev "orchestra/testbench:${{ matrix.testbench }}" "nesbot/carbon:${{ matrix.carbon }}" "filament/filament:${{ matrix.filament }}" "pestphp/pest:${{ matrix.pest }}" "pestphp/pest-plugin-laravel:${{ matrix.pest-plugin-laravel }}" "pestphp/pest-plugin-livewire:${{ matrix.pest-plugin-livewire }}" --no-interaction --no-update
          composer update --prefer-stable --prefer-dist --no-interaction

      - name: Execute tests
        run: vendor/bin/pest --ci --no-coverage
