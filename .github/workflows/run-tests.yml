name: run-tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

defaults:
  run:
    shell: bash

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: true
      matrix:
        os: [ubuntu-latest, windows-latest]
        php: [8.5, 8.4, 8.3, 8.2]
        laravel: [13.*, 12.*, 11.*]
        stability: [prefer-lowest, prefer-stable]
        exclude:
          - laravel: 13.*
            php: 8.2
          - laravel: 11.*
            php: 8.5

    name: P${{ matrix.php }} - L${{ matrix.laravel }} - ${{ matrix.stability }} - ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Configure Git line endings
        if: runner.os == 'Windows'
        run: git config --global core.autocrlf false

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick, fileinfo
          coverage: none

      - name: Setup problem matchers
        run: |
          echo "::add-matcher::${{ runner.tool_cache }}/php.json"
          echo "::add-matcher::${{ runner.tool_cache }}/phpunit.json"

      - name: Install dependencies
        run: bash .github/scripts/install-test-dependencies.sh "${{ matrix.laravel }}" "${{ matrix.stability }}"

      - name: List Installed Dependencies
        run: composer show -D

      - name: Check code style
        run: vendor/bin/pint --test

      - name: Execute tests
        run: vendor/bin/pest --ci --no-coverage

  platform-smoke:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: 8.5
            laravel: 13.*
            filament: '5.0'
          - php: 8.4
            laravel: 13.*
            filament: '5.0'
          - php: 8.2
            laravel: 12.*
            filament: '4.0'

    name: Smoke P${{ matrix.php }} - L${{ matrix.laravel }} - F${{ matrix.filament }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick, fileinfo
          coverage: none

      - name: Install dependencies
        run: bash .github/scripts/install-smoke-dependencies.sh "${{ matrix.laravel }}" "${{ matrix.php }}" "${{ matrix.filament }}"

      - name: Execute tests
        run: vendor/bin/pest --ci --no-coverage
