name: run-coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: coverage-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  coverage:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    name: Code coverage · PHP 8.4 · Laravel 13

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv, imagick, fileinfo
          coverage: pcov
          tools: composer:v2

      - name: Install dependencies
        env:
          COMPOSER_PROCESS_TIMEOUT: 0
        run: bash .github/scripts/install-test-dependencies.sh "13.*" "prefer-stable"

      - name: Run tests with coverage
        run: |
          mkdir -p build/logs
          vendor/bin/pest --ci --coverage --min=96 --coverage-clover=build/logs/clover.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v7
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: build/logs/clover.xml
          fail_ci_if_error: false
